<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear noticia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/estilos.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<header class="bg-dark shadow-sm">
  <nav class="navbar navbar-expand-lg navbar-dark container">
    <a class="navbar-brand fw-bold" href="/">AO1 Noticias</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/formulario">Crear noticia</a>
        </li>
      </ul>
    </div>
  </nav>
</header>

<main class="container my-5 flex-grow-1">

  <div class="bg-white rounded shadow-sm p-4">

    <h1 class="mb-4">Nueva noticia</h1>

    <form action="/guardar" method="POST">

      <div class="mb-3">
        <label for="titulo" class="form-label">Título</label>
        <input type="text" class="form-control" id="titulo" name="titulo" required>
      </div>

      <div class="mb-4">
        <label for="contenido" class="form-label">Contenido</label>
        <textarea class="form-control" id="contenido" name="contenido" rows="6" required></textarea>
      </div>

      <button type="submit" class="btn btn-primary">
        Publicar noticia
      </button>

      <a href="/" class="btn btn-outline-secondary ms-2">
        Volver
      </a>

    </form>

  </div>

</main>

<footer class="bg-dark text-white text-center py-3 mt-auto">
  <small>Actividad Obligatoria 1 - Web II</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
